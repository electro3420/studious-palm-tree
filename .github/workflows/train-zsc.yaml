name: Train Hyper ZSC

on:
  workflow_dispatch:   # Manual trigger
  # schedule:
  #   - cron: '0 2 * * *'   # Optional: daily at 2 AM UTC

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ZSC Training Script
        run: python zsc_train.py
        env:
          HF_HUB_DISABLE_SYMLINKS_WARNING: 1   # Suppress warnings

      - name: Upload trained model as artifact
        uses: actions/upload-artifact@v4
        with:
          name: hyper-zsc-model
          path: /content/hyper_zsc_final.pt
          retention-days: 7
